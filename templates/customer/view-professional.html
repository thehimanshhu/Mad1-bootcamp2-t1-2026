<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Helpify</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse " id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Search</a>
                    </li>
                    <li class="nav-item">

                        <div class="dropdown">
                            <button class="btn dropdown-toggle" type="button" data-bs-toggle="dropdown"
                                aria-expanded="false">
                                <i class="bi bi-person-circle fs-5"></i>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item" href="#">LogOut</a></li>

                            </ul>
                        </div>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <div class="card ms-4 mt-4 me-4">
        <div class="card-body">
            <h5 class="card-title">Professional Details</h5>
            <p class="card-text"><strong>Name:</strong> {{prof.name}}</p>
            <p class="card-text"><strong>Email:</strong>{{prof.email}} </p>
        </div>
    </div>

    <div class="card mt-4 ms-4 me-4 shadow-lg">
        <div class="card-header">
            <h3>Packages</h3>
        </div>
        <div class="card-body">
            <div class="row">
                {% for package in packages %}
                {% if package.status == 'Approved' %}
                <div class="col-3 mb-3">
                    <div class="card">
                        <div class="card-body">
                            {{package.title}}
                            <p class="card-text"><strong>Description:</strong> {{package.description}}.</p>
                            <a href="/book/{{package.id}}" class="btn btn-primary"> Book</a>
                        </div>
                    </div>
                </div>
                {% endif%}
                {% endfor %}
            </div>



        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
